name: Generate Scenarios

on:
  schedule:
    # 每周运行一次
    - cron: '0 0 * * 0'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-scenarios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run scenario generation script
        run: node scripts/generate-scenarios.cjs
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}

      - name: Update index.md with generated scenarios
        run: |
          # 使用Python来替换文件内容，更可靠
          python3 << 'PYTHON_SCRIPT'
          import re

          with open('docs/index.md', 'r', encoding='utf-8') as f:
              content = f.read()

          with open('data/scenarios-frontend.md', 'r', encoding='utf-8') as f:
              new_content = f.read()

          # 替换 ## 我想做什么？ 到 </style> 之间的内容
          pattern = r'## 我想做什么？.*?</style>'
          content = re.sub(pattern, new_content, content, flags=re.DOTALL)

          with open('docs/index.md', 'w', encoding='utf-8') as f:
              f.write(content)
          PYTHON_SCRIPT

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add docs/index.md
          git add data/scenarios.json
          git add data/scenarios-frontend.md
          git commit -m 'Update scenarios' || echo 'No changes to commit'
          git push
