name: Update Projects Data

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - trending
          - summarize
          - api

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-trending:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.inputs.mode == 'all' || github.event.inputs.mode == 'trending' || github.event.inputs.mode == ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Scrape GitHub Trending
        run: node scripts/scrape-trending.cjs
        id: scrape
        continue-on-error: true

      - name: Handle scrape failure
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "::warning::Scrape failed, but continuing with existing data"
          echo "SCRAPE_FAILED=true" >> $GITHUB_ENV

      - name: Reclassify projects
        run: node scripts/reclassify.cjs

      - name: Validate data
        run: |
          node -e "
            const data = require('./data/projects.json');
            const required = ['name', 'github', 'domain', 'subCategory'];
            const invalid = data.filter(p => !p.name || !p.github);
            if (invalid.length > 0) {
              console.error('Invalid projects found:', invalid.length);
              process.exit(1);
            }
            console.log('Validation passed. Total projects:', data.length);
          "

      - name: Copy to public folder
        run: cp data/projects.json docs/public/data/projects.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/projects.json docs/public/data/projects.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: 抓取GitHub Trending ($(date +%Y-%m-%d))"
            git push
          fi

  ai-summarize:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.inputs.mode == 'all' || github.event.inputs.mode == 'summarize' || github.event.inputs.mode == ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: AI Summarize
        run: node scripts/ai-summarize.cjs
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        continue-on-error: true
        id: ai-summarize

      - name: Handle AI failure
        if: steps.ai-summarize.outcome == 'failure'
        run: |
          echo "::warning::AI summarize failed, but continuing"
          echo "AI_FAILED=true" >> $GITHUB_ENV

      - name: Copy to public folder
        run: cp data/projects.json docs/public/data/projects.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/projects.json docs/public/data/projects.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: AI总结项目描述 ($(date +%Y-%m-%d))"
            git push
          fi

  update-api:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.inputs.mode == 'all' || github.event.inputs.mode == 'api'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run update script
        run: node scripts/update-projects.cjs
        env:
          GHKEY: ${{ secrets.GHKEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        continue-on-error: true
        id: api-update

      - name: Handle API failure
        if: steps.api-update.outcome == 'failure'
        run: echo "::warning::API update failed"

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/projects.json data/stars-history.json docs/public/data/projects.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: API数据更新 ($(date +%Y-%m-%d))"
            git push
          fi
