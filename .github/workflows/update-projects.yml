name: Update Projects Data

on:
  schedule:
    # 每48小时运行一次
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - trending
          - summarize
          - api

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-trending:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.inputs.mode == 'all' || github.event.inputs.mode == 'trending' || github.event.inputs.mode == ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Scrape GitHub Trending
        run: node scripts/scrape-trending.cjs

      - name: Copy to public folder
        run: cp data/projects.json docs/public/data/projects.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/projects.json docs/public/data/projects.json
          git commit -m "Update: 抓取GitHub Trending" || echo "No changes"
          git push

  ai-summarize:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.inputs.mode == 'all' || github.event.inputs.mode == 'summarize' || github.event.inputs.mode == ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: AI Summarize
        run: node scripts/ai-summarize.cjs
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}

      - name: Copy to public folder
        run: cp data/projects.json docs/public/data/projects.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/projects.json docs/public/data/projects.json
          git commit -m "Update: AI总结项目描述" || echo "No changes"
          git push

  update-api:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event.inputs.mode == 'all' || github.event.inputs.mode == 'api'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run update script
        run: node scripts/update-projects.cjs
        env:
          GHKEY: ${{ secrets.GHKEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/projects.json
          git add data/stars-history.json
          git commit -m 'Update: API数据更新' || echo 'No changes'
          git push
